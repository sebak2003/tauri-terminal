<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tauri Terminal</title>
  <link rel="stylesheet" href="vendor/xterm.css">
  <style>
    /* ===== Reset & Base ===== */
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg-primary: #0a0a0f;
      --bg-secondary: #12121a;
      --bg-tertiary: #1a1a26;
      --bg-hover: #1f1f2e;
      --bg-active: #252538;
      --border: rgba(255, 255, 255, 0.06);
      --border-focus: rgba(139, 92, 246, 0.5);
      --text-primary: #f0f0f5;
      --text-secondary: #8888a0;
      --text-tertiary: #55556a;
      --accent: #8b5cf6;
      --accent-soft: rgba(139, 92, 246, 0.12);
      --accent-glow: rgba(139, 92, 246, 0.25);
      --success: #34d399;
      --warning: #fbbf24;
      --danger: #f87171;
      --radius-sm: 8px;
      --radius-md: 12px;
      --radius-lg: 16px;
      --shadow-md: 0 4px 12px rgba(0,0,0,0.4);
      --shadow-lg: 0 8px 32px rgba(0,0,0,0.6);
      --transition: 200ms cubic-bezier(0.4, 0, 0.2, 1);
      --terminal-bg: #0c0c14;
      --sidebar-width: 248px;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      background: var(--bg-primary);
      color: var(--text-primary);
      overflow: hidden;
      height: 100vh;
      user-select: none;
      -webkit-font-smoothing: antialiased;
    }

    /* ===== Titlebar ===== */
    .titlebar {
      height: 44px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 16px;
      position: relative;
      z-index: 100;
      border-bottom: 1px solid var(--border);
    }
    .titlebar-drag {
      position: absolute;
      inset: 0;
      z-index: 0;
    }
    .titlebar-controls {
      display: flex;
      gap: 8px;
      position: relative;
      z-index: 1;
    }
    .titlebar-btn {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      border: none;
      cursor: pointer;
      transition: var(--transition);
      opacity: 0.8;
    }
    .titlebar-btn:hover { opacity: 1; transform: scale(1.1); }
    .btn-close { background: #ff5f57; }
    .btn-minimize { background: #ffbd2e; }
    .btn-maximize { background: #28c840; }

    .titlebar-center {
      display: flex;
      align-items: center;
      gap: 12px;
      position: relative;
      z-index: 1;
    }
    .titlebar-title {
      font-size: 12px;
      font-weight: 500;
      color: var(--text-tertiary);
      letter-spacing: 0.5px;
      text-transform: uppercase;
    }

    .titlebar-actions {
      display: flex;
      gap: 6px;
      position: relative;
      z-index: 1;
    }
    .titlebar-action {
      padding: 5px 10px;
      border-radius: var(--radius-sm);
      border: 1px solid var(--border);
      background: var(--bg-secondary);
      color: var(--text-secondary);
      font-size: 11px;
      font-weight: 500;
      cursor: pointer;
      transition: var(--transition);
      display: flex;
      align-items: center;
      gap: 5px;
      font-family: inherit;
    }
    .titlebar-action:hover {
      background: var(--bg-hover);
      color: var(--text-primary);
      border-color: rgba(255,255,255,0.1);
    }
    .titlebar-action.active {
      background: var(--accent-soft);
      color: var(--accent);
      border-color: var(--border-focus);
    }

    /* ===== Main Layout ===== */
    .main-layout {
      height: calc(100vh - 44px);
      display: flex;
      flex-direction: row;
    }

    /* ===== Sidebar ===== */
    .sidebar {
      width: var(--sidebar-width);
      min-width: 200px;
      background: var(--bg-secondary);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      flex-shrink: 0;
      transition: width var(--transition), min-width var(--transition);
      overflow: hidden;
    }
    .sidebar.collapsed {
      width: 0;
      min-width: 0;
      border-right: none;
    }

    .sidebar-header {
      height: 42px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 16px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    .sidebar-label {
      font-size: 11px;
      font-weight: 600;
      color: var(--text-tertiary);
      text-transform: uppercase;
      letter-spacing: 0.8px;
    }
    .sidebar-add-btn {
      width: 24px;
      height: 24px;
      border-radius: var(--radius-sm);
      border: none;
      background: transparent;
      color: var(--text-tertiary);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: var(--transition);
    }
    .sidebar-add-btn:hover {
      color: var(--accent);
      background: var(--accent-soft);
    }

    .sidebar-scroll {
      flex: 1;
      overflow-y: auto;
      overflow-x: hidden;
      padding: 6px 0;
      scrollbar-width: none;
    }
    .sidebar-scroll::-webkit-scrollbar { display: none; }

    /* Empty state */
    .sidebar-empty {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 24px;
      text-align: center;
      gap: 12px;
    }
    .sidebar-empty-icon {
      width: 48px;
      height: 48px;
      border-radius: 14px;
      background: var(--bg-tertiary);
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text-tertiary);
    }
    .sidebar-empty-text {
      font-size: 12px;
      color: var(--text-tertiary);
      line-height: 1.5;
    }
    .sidebar-empty-action {
      margin-top: 4px;
      padding: 6px 14px;
      border-radius: 20px;
      border: 1px dashed var(--border);
      background: none;
      color: var(--text-secondary);
      font-size: 11px;
      font-weight: 500;
      cursor: pointer;
      transition: var(--transition);
      font-family: inherit;
    }
    .sidebar-empty-action:hover {
      border-color: var(--accent);
      color: var(--accent);
      background: var(--accent-soft);
    }

    /* Project item */
    .project-item {
      margin: 0 6px 2px;
    }
    .project-header {
      display: flex;
      align-items: center;
      padding: 6px 10px;
      gap: 8px;
      cursor: pointer;
      border-radius: var(--radius-sm);
      transition: var(--transition);
      position: relative;
    }
    .project-header:hover {
      background: var(--bg-hover);
    }
    .project-chevron {
      width: 14px;
      height: 14px;
      color: var(--text-tertiary);
      flex-shrink: 0;
      transition: transform var(--transition);
    }
    .project-item.expanded .project-chevron {
      transform: rotate(90deg);
    }
    .project-folder-icon {
      width: 16px;
      height: 16px;
      flex-shrink: 0;
    }
    .project-name {
      flex: 1;
      font-size: 13px;
      font-weight: 500;
      color: var(--text-secondary);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      transition: var(--transition);
    }
    .project-header:hover .project-name {
      color: var(--text-primary);
    }
    .project-count {
      font-size: 10px;
      color: var(--text-tertiary);
      background: var(--bg-tertiary);
      padding: 1px 6px;
      border-radius: 10px;
      font-weight: 600;
      min-width: 18px;
      text-align: center;
      transition: var(--transition);
    }
    .project-count.has-terminals {
      color: var(--accent);
      background: var(--accent-soft);
    }
    .project-actions {
      display: flex;
      gap: 2px;
      opacity: 0;
      transition: var(--transition);
    }
    .project-header:hover .project-actions {
      opacity: 1;
    }
    .project-action-btn {
      width: 22px;
      height: 22px;
      border-radius: 5px;
      border: none;
      background: transparent;
      color: var(--text-tertiary);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: var(--transition);
    }
    .project-action-btn:hover {
      background: var(--accent-soft);
      color: var(--accent);
    }
    .project-action-btn.remove-btn:hover {
      background: rgba(248, 113, 113, 0.12);
      color: var(--danger);
    }
    .project-action-btn.commit-btn:hover {
      background: rgba(251, 191, 36, 0.12);
      color: #fbbf24;
    }
    .project-action-btn.push-btn:hover {
      background: rgba(52, 211, 153, 0.12);
      color: var(--success);
    }

    /* Git status - barely there */
    .git-info {
      display: flex;
      align-items: center;
      gap: 5px;
      margin-left: auto;
      flex-shrink: 0;
    }
    .git-branch {
      font-size: 10px;
      font-family: 'JetBrains Mono', 'Cascadia Code', monospace;
      color: var(--text-tertiary);
      opacity: 0.45;
      max-width: 64px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      letter-spacing: -0.2px;
    }
    .git-changes {
      display: flex;
      align-items: center;
      gap: 2px;
      font-size: 10px;
      font-family: 'JetBrains Mono', monospace;
      color: #f59e0b;
      font-weight: 600;
      letter-spacing: -0.3px;
    }
    .git-dot {
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: #f59e0b;
      flex-shrink: 0;
      animation: gitBreathe 3s ease-in-out infinite;
    }
    .git-ahead {
      display: flex;
      align-items: center;
      gap: 1px;
      font-size: 10px;
      font-family: 'JetBrains Mono', monospace;
      color: var(--accent);
      font-weight: 600;
      letter-spacing: -0.3px;
    }
    .git-ahead svg {
      width: 10px;
      height: 10px;
      opacity: 0.8;
    }
    @keyframes gitBreathe {
      0%, 100% { opacity: 0.5; }
      50% { opacity: 1; }
    }

    /* Commit inline input */
    .git-commit-row {
      display: none;
      align-items: center;
      gap: 6px;
      padding: 3px 10px 5px 36px;
      animation: fadeInUp 150ms ease;
    }
    .git-commit-row.visible {
      display: flex;
    }
    .git-commit-field {
      flex: 1;
      background: var(--bg-tertiary);
      border: 1px solid var(--border);
      border-radius: 5px;
      color: var(--text-primary);
      font-size: 11px;
      padding: 5px 8px;
      outline: none;
      font-family: 'JetBrains Mono', 'Cascadia Code', monospace;
      transition: border-color var(--transition);
    }
    .git-commit-field:focus {
      border-color: var(--border-focus);
      box-shadow: 0 0 0 2px var(--accent-glow);
    }
    .git-commit-field::placeholder {
      color: var(--text-tertiary);
    }

    /* Git operation feedback */
    .project-header.git-busy .git-dot {
      animation: spin 600ms linear infinite;
      border-radius: 2px;
      width: 6px;
      height: 6px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Claude Code state indicators */
    .cc-indicator {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .cc-working {
      border: 1.5px solid transparent;
      border-top-color: var(--accent);
      animation: spin 700ms linear infinite;
    }
    .cc-idle {
      width: 7px;
      height: 7px;
      background: #fbbf24;
      box-shadow: 0 0 6px rgba(251, 191, 36, 0.3);
      animation: ccAttention 2.5s ease-in-out infinite;
    }
    @keyframes ccAttention {
      0%, 100% { box-shadow: 0 0 3px rgba(251, 191, 36, 0.2); opacity: 0.65; }
      50% { box-shadow: 0 0 10px rgba(251, 191, 36, 0.5); opacity: 1; }
    }
    /* Project-level CC attention dot */
    .project-cc-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #fbbf24;
      flex-shrink: 0;
      animation: ccAttention 2.5s ease-in-out infinite;
    }

    /* Terminal sub-items */
    .project-terminals {
      overflow: hidden;
      max-height: 0;
      transition: max-height 300ms cubic-bezier(0.4, 0, 0.2, 1);
    }
    .project-item.expanded .project-terminals {
      max-height: 500px;
    }
    .terminal-subitem {
      display: flex;
      align-items: center;
      padding: 5px 10px 5px 38px;
      gap: 8px;
      cursor: pointer;
      border-radius: var(--radius-sm);
      margin: 0 6px;
      transition: var(--transition);
      position: relative;
    }
    .terminal-subitem::before {
      content: '';
      position: absolute;
      left: 22px;
      top: 0;
      bottom: 0;
      width: 1px;
      background: var(--border);
    }
    .terminal-subitem:hover {
      background: var(--bg-hover);
    }
    .terminal-subitem.active {
      background: var(--accent-soft);
    }
    .terminal-subitem.active .term-label {
      color: var(--accent);
    }
    .terminal-subitem .term-icon {
      width: 14px;
      height: 14px;
      color: var(--text-tertiary);
      flex-shrink: 0;
    }
    .terminal-subitem.active .term-icon {
      color: var(--accent);
    }
    .term-label {
      flex: 1;
      font-size: 12px;
      color: var(--text-tertiary);
      font-weight: 400;
      font-family: 'JetBrains Mono', 'Cascadia Code', 'Fira Code', monospace;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .terminal-subitem:hover .term-label {
      color: var(--text-secondary);
    }
    .term-close {
      width: 18px;
      height: 18px;
      border-radius: 4px;
      border: none;
      background: transparent;
      color: var(--text-tertiary);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      transition: var(--transition);
      font-size: 13px;
      line-height: 1;
    }
    .terminal-subitem:hover .term-close { opacity: 0.6; }
    .term-close:hover { opacity: 1 !important; background: rgba(248,113,113,0.15); color: var(--danger); }

    /* Sidebar resize handle */
    .sidebar-resize {
      width: 3px;
      cursor: col-resize;
      flex-shrink: 0;
      transition: background var(--transition);
      position: relative;
    }
    .sidebar-resize::after {
      content: '';
      position: absolute;
      inset: 0 -3px;
    }
    .sidebar-resize:hover,
    .sidebar-resize.active {
      background: var(--accent);
    }

    /* ===== Content Area ===== */
    .content-area {
      flex: 1;
      display: flex;
      flex-direction: column;
      min-width: 0;
    }

    /* ===== Tasks Panel ===== */
    .tasks-panel {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      min-height: 80px;
      position: relative;
    }
    .tasks-panel.hidden { display: none; }

    .header {
      padding: 16px 24px 16px;
      flex-shrink: 0;
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
    }
    .greeting {
      font-size: 12px;
      color: var(--text-secondary);
      font-weight: 400;
      margin-bottom: 2px;
    }
    .date-display {
      font-size: 22px;
      font-weight: 700;
      letter-spacing: -0.5px;
      background: linear-gradient(135deg, var(--text-primary) 0%, var(--text-secondary) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      line-height: 1.2;
    }

    .stats-row {
      display: flex;
      gap: 8px;
    }
    .stat-pill {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 6px 12px;
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      border-radius: 20px;
      font-size: 12px;
    }
    .stat-pill .val { font-weight: 700; }
    .stat-pill .label { color: var(--text-tertiary); font-weight: 400; }
    .stat-accent .val { color: var(--accent); }
    .stat-success .val { color: var(--success); }

    /* Tasks */
    .tasks-scroll {
      flex: 1;
      overflow-y: auto;
      padding: 8px 24px;
      padding-bottom: 70px;
      scrollbar-width: none;
    }
    .tasks-scroll::-webkit-scrollbar { display: none; }

    .task-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 14px;
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      margin-bottom: 6px;
      cursor: pointer;
      transition: var(--transition);
      position: relative;
      overflow: hidden;
    }
    .task-item::before {
      content: '';
      position: absolute;
      left: 0; top: 0; bottom: 0;
      width: 3px;
      border-radius: 0 2px 2px 0;
      opacity: 0;
      transition: var(--transition);
    }
    .task-item:hover { background: var(--bg-hover); transform: translateX(2px); }
    .task-item:hover::before { opacity: 1; }
    .task-item.priority-high::before { background: var(--danger); }
    .task-item.priority-medium::before { background: var(--warning); }
    .task-item.priority-low::before { background: var(--success); }
    .task-item.completed { opacity: 0.4; }
    .task-item.completed .task-title { text-decoration: line-through; text-decoration-color: var(--text-tertiary); }

    .task-check {
      width: 18px; height: 18px;
      border-radius: 50%;
      border: 2px solid var(--text-tertiary);
      flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      transition: var(--transition);
    }
    .task-check:hover { border-color: var(--accent); background: var(--accent-soft); }
    .task-check.checked { border-color: var(--accent); background: var(--accent); }
    .task-check.checked svg { opacity: 1; }
    .task-check svg { width: 10px; height: 10px; opacity: 0; transition: var(--transition); }

    .task-content { flex: 1; min-width: 0; }
    .task-title { font-size: 13px; font-weight: 500; line-height: 1.3; }
    .task-meta { display: flex; align-items: center; gap: 6px; margin-top: 3px; }
    .task-tag { font-size: 10px; padding: 1px 6px; border-radius: 20px; font-weight: 500; }
    .tag-work { background: rgba(59, 130, 246, 0.15); color: #60a5fa; }
    .tag-personal { background: rgba(251, 191, 36, 0.15); color: #fbbf24; }
    .tag-health { background: rgba(52, 211, 153, 0.15); color: #34d399; }
    .tag-creative { background: rgba(244, 114, 182, 0.15); color: #f472b6; }
    .tag-finance { background: rgba(139, 92, 246, 0.15); color: #8b5cf6; }
    .task-time { font-size: 10px; color: var(--text-tertiary); }

    .task-del {
      width: 24px; height: 24px; border-radius: var(--radius-sm);
      border: none; background: transparent; color: var(--text-tertiary);
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      transition: var(--transition); opacity: 0; flex-shrink: 0;
    }
    .task-item:hover .task-del { opacity: 1; }
    .task-del:hover { background: var(--bg-active); color: var(--danger); }

    /* Add task bar */
    .add-task-bar {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      padding: 12px 24px 16px;
      background: linear-gradient(to top, var(--bg-primary) 60%, transparent);
      z-index: 10;
    }
    .add-task-input-wrap {
      display: flex; align-items: center; gap: 10px;
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 3px 5px 3px 16px;
      transition: var(--transition);
      box-shadow: var(--shadow-md);
    }
    .add-task-input-wrap:focus-within {
      border-color: var(--border-focus);
      box-shadow: 0 0 0 3px var(--accent-glow), var(--shadow-md);
    }
    .add-task-input {
      flex: 1; background: none; border: none; outline: none;
      color: var(--text-primary); font-size: 13px; font-family: inherit; padding: 8px 0;
    }
    .add-task-input::placeholder { color: var(--text-tertiary); }
    .add-task-btn {
      width: 32px; height: 32px; border-radius: var(--radius-md); border: none;
      background: var(--accent); color: white; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: var(--transition); flex-shrink: 0;
    }
    .add-task-btn:hover { background: #7c3aed; transform: scale(1.05); }

    /* ===== Resize Handle (vertical) ===== */
    .resize-handle {
      height: 6px;
      background: var(--bg-primary);
      cursor: row-resize;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      border-top: 1px solid var(--border);
      border-bottom: 1px solid var(--border);
      transition: background var(--transition);
    }
    .resize-handle:hover, .resize-handle.active {
      background: var(--accent-soft);
    }
    .resize-handle::after {
      content: '';
      width: 40px; height: 2px;
      background: var(--text-tertiary);
      border-radius: 1px;
      opacity: 0.4;
    }

    /* ===== Terminal Panel ===== */
    .terminal-panel {
      display: none;
      flex-direction: column;
      min-height: 150px;
      background: var(--terminal-bg);
    }
    .terminal-panel.visible { display: flex; }

    .terminal-panel-header {
      display: flex;
      align-items: center;
      padding: 0 12px;
      height: 32px;
      background: var(--bg-secondary);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
      gap: 8px;
    }
    .terminal-panel-label {
      font-size: 11px;
      font-weight: 500;
      color: var(--text-tertiary);
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .terminal-panel-label svg { opacity: 0.5; }
    .terminal-panel-name {
      font-size: 11px;
      font-weight: 600;
      color: var(--text-secondary);
      font-family: 'JetBrains Mono', 'Cascadia Code', monospace;
    }
    .terminal-panel-spacer { flex: 1; }

    /* Terminal containers */
    .terminals-container {

      const sorted = [...tasks].sort((a, b) => a.done !== b.done ? (a.done ? 1 : -1) : pri[a.priority] - pri[b.priority]);
      c.innerHTML = sorted.map(t => `
        <div class="task-item ${t.done ? 'completed' : ''} priority-${t.priority}" data-id="${t.id}">
          <div class="task-check ${t.done ? 'checked' : ''}" onclick="toggleTask(${t.id})">${icons.check}</div>
          <div class="task-content" onclick="toggleTask(${t.id})">
            <div class="task-title">${t.title}</div>
            <div class="task-meta">
              <span class="task-tag tag-${t.tag}">${t.tag}</span>
              <span class="task-time">${t.time}</span>
            </div>
          </div>
          <button class="task-del" onclick="deleteTask(${t.id})">${icons.trash}</button>
        </div>`).join('');
      document.getElementById('stat-total').textContent = tasks.length;
      document.getElementById('stat-done').textContent = tasks.filter(t => t.done).length;
    }

    function toggleTask(id) { const t = tasks.find(x => x.id === id); if (t) { t.done = !t.done; renderTasks(); } }
    function deleteTask(id) {
      const el = document.querySelector(`.task-item[data-id="${id}"]`);
      if (el) { el.style.transition = '250ms'; el.style.opacity = '0'; el.style.transform = 'translateX(30px)'; setTimeout(() => { tasks = tasks.filter(t => t.id !== id); renderTasks(); }, 230); }
    }
    function addTask() {
      const input = document.getElementById('task-input');
      const title = input.value.trim();
      if (!title) return;
      const tags = ['work', 'personal', 'health', 'creative', 'finance'];
      const pris = ['high', 'medium', 'low'];
      tasks.unshift({ id: nextTaskId++, title, tag: tags[Math.floor(Math.random() * tags.length)], time: new Date().toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit' }), priority: pris[Math.floor(Math.random() * pris.length)], done: false });
      input.value = '';
      renderTasks();
    }

    document.getElementById('add-btn').addEventListener('click', addTask);
    document.getElementById('task-input').addEventListener('keydown', e => { if (e.key === 'Enter') addTask(); });
    updateHeader();
    renderTasks();
    setInterval(updateHeader, 60000);

    // =======================================
    // ===== PROJECT & TERMINAL SYSTEM =====
    // =======================================

    const FitAddon = window['FitAddon'];
    const WSL_BASE = '/home/sebak2003/github';

    // State
    let projects = [];       // [{path, name, expanded, terminals: [{id, xterm, fitAddon, paneEl}]}]
    let activeTermId = null;  // currently visible terminal id
    let terminalPanelHeight = 340;
    let tasksVisible = true;

    // ===== Terminal events from Rust =====
    // Braille spinner chars used by Claude Code during thinking
    const CC_BRAILLE = /[\u280B\u2819\u2839\u2838\u283C\u2834\u2826\u2827\u2807\u280F]/;
    // OSC title sequence: \x1b]0; or \x1b]2; ... \x07
    const OSC_REGEX = /\x1b\][02];([^\x07]*)\x07/g;

    listen('terminal-output', (event) => {
      const { id, data } = event.payload;
      const term = findTerminal(id);
      if (!term) return;
      term.xterm.write(data);
      term.lastOutputTime = Date.now();

      // Parse OSC title sequences for Claude Code detection
      let match;
      OSC_REGEX.lastIndex = 0;
      while ((match = OSC_REGEX.exec(data)) !== null) {
        const title = match[1];
        if (/Claude Code|Claude:/.test(title)) {
          term.isClaudeCode = true;
          if (CC_BRAILLE.test(title)) {
            // Spinner active = CC is working
            term.ccLastSpinnerTime = Date.now();
            if (term.claudeState !== 'working') {
              term.claudeState = 'working';
              renderSidebar();
            }
          }
        }
      }
    });

    listen('terminal-exited', (event) => {
      const { id } = event.payload;
      const term = findTerminal(id);
      if (term) {
        term.xterm.writeln('\r\n\x1b[90m[Process exited]\x1b[0m');
        term.isClaudeCode = false;
        term.claudeState = null;
        renderSidebar();
      }
    });

    function findTerminal(id) {
      for (const p of projects) {
        const t = p.terminals.find(t => t.id === id);
        if (t) return t;
      }
      return null;
    }

    function findTerminalProject(id) {
      return projects.find(p => p.terminals.some(t => t.id === id));
    }

    // ===== Load saved projects on startup =====
    async function initProjects() {
      try {
        const saved = await invoke('load_projects');
        projects = saved.map(p => ({ ...p, expanded: true, terminals: [], gitStatus: null }));
      } catch (e) {
        console.error('Failed to load projects:', e);
        projects = [];
      }
      renderSidebar();
      // Fetch git statuses in background (non-blocking)
      refreshAllGitStatuses();
    }

    async function persistProjects() {
      try {
        await invoke('save_projects', { projects: projects.map(p => ({ path: p.path, name: p.name })) });
      } catch (e) {
        console.error('Failed to save projects:', e);
      }
    }

    // ===== Sidebar rendering =====
    function renderSidebar() {
      const container = document.getElementById('sidebar-projects');

      if (projects.length === 0) {
        container.innerHTML = `
          <div class="sidebar-empty">
            <div class="sidebar-empty-icon">${icons.emptyFolder}</div>
            <div class="sidebar-empty-text">No projects yet.<br>Add your repos to get started.</div>
            <button class="sidebar-empty-action" onclick="openAddModal()">Add projects</button>
          </div>`;
        return;
      }

      container.innerHTML = projects.map((p, pi) => {
        const termCount = p.terminals.length;
        const countClass = termCount > 0 ? 'has-terminals' : '';
        const expandedClass = p.expanded ? 'expanded' : '';
        const gs = p.gitStatus;

        const termItems = p.terminals.map((t, ti) => {
          const activeClass = t.id === activeTermId ? 'active' : '';
          // Claude Code state indicator
          let ccDot = '';
          if (t.isClaudeCode && t.claudeState === 'working') {
            ccDot = '<span class="cc-indicator cc-working"></span>';
          } else if (t.isClaudeCode && t.claudeState === 'idle') {
            ccDot = '<span class="cc-indicator cc-idle"></span>';
          }
          const termLabel = t.isClaudeCode ? `claude ${t.id}` : `bash ${t.id}`;
          return `<div class="terminal-subitem ${activeClass}" data-term-id="${t.id}" onclick="activateTerminal(${t.id})">
            ${icons.terminal}
            <span class="term-label">${termLabel}</span>
            ${ccDot}
            <button class="term-close" onclick="event.stopPropagation(); closeTerminal(${t.id})">&times;</button>
          </div>`;
        }).join('');

        // Git status indicators (barely there)
        let gitInfoHtml = '';
        if (gs && gs.is_repo) {
          const branchHtml = gs.branch ? `<span class="git-branch">${gs.branch}</span>` : '';
          const changesHtml = gs.changed_count > 0 ? `<span class="git-changes"><span class="git-dot"></span>${gs.changed_count}</span>` : '';
          const aheadHtml = gs.ahead > 0 ? `<span class="git-ahead">${icons.gitArrowUp}${gs.ahead}</span>` : '';
          gitInfoHtml = `<div class="git-info">${branchHtml}${changesHtml}${aheadHtml}</div>`;
        }

        // Action buttons: commit/push appear only when relevant
        const showCommit = gs && gs.changed_count > 0;
        const showPush = gs && gs.ahead > 0;
        const commitBtn = showCommit ? `<button class="project-action-btn commit-btn" title="Commit" onclick="event.stopPropagation(); showCommitInput(${pi})">${icons.gitCommit}</button>` : '';
        const pushBtn = showPush ? `<button class="project-action-btn push-btn" title="Push" onclick="event.stopPropagation(); pushProject(${pi})">${icons.gitPush}</button>` : '';

        // CC attention dot on project header (visible even when collapsed)
        const hasIdleCC = p.terminals.some(t => t.isClaudeCode && t.claudeState === 'idle');
        const projectCCDot = hasIdleCC ? '<span class="project-cc-dot"></span>' : '';

        // Commit input row
        const commitRowId = `commit-row-${pi}`;

        return `<div class="project-item ${expandedClass}" data-project-idx="${pi}">
          <div class="project-header" id="project-header-${pi}" onclick="toggleProject(${pi})">
            ${icons.chevron}
            ${icons.folder}
            <span class="project-name" title="${p.path}">${p.name}</span>
            ${projectCCDot}
            ${gitInfoHtml}
            <span class="project-count ${countClass}">${termCount}</span>
            <div class="project-actions">
              ${commitBtn}
              ${pushBtn}
              <button class="project-action-btn" title="New terminal" onclick="event.stopPropagation(); spawnProjectTerminal(${pi})">${icons.plus}</button>
              <button class="project-action-btn remove-btn" title="Remove project" onclick="event.stopPropagation(); removeProject(${pi})">${icons.remove}</button>
            </div>
          </div>
          <div class="git-commit-row" id="${commitRowId}">
            <input class="git-commit-field" placeholder="commit message..." onkeydown="handleCommitKey(event, ${pi})" onclick="event.stopPropagation()">
          </div>
          <div class="project-terminals">${termItems}</div>
        </div>`;
      }).join('');
    }

    function toggleProject(idx) {
      projects[idx].expanded = !projects[idx].expanded;
      renderSidebar();
    }

    async function removeProject(idx) {
      const project = projects[idx];
      // Close all terminals in this project
      for (const t of [...project.terminals]) {
        await closeTerminal(t.id);
      }
      projects.splice(idx, 1);
      await persistProjects();
      renderSidebar();
    }

    // ===== Git status =====
    async function refreshGitStatus(projectIdx) {
      const p = projects[projectIdx];
      if (!p) return;
      try {
        p.gitStatus = await invoke('get_git_status', { path: p.path });
      } catch (e) {
        p.gitStatus = null;
      }
    }

    async function refreshAllGitStatuses() {
      const promises = projects.map((_, i) => refreshGitStatus(i));
      await Promise.all(promises);
      renderSidebar();
    }

    // Poll git status every 8 seconds
    setInterval(refreshAllGitStatuses, 8000);

    // Claude Code idle detection — check every second
    setInterval(() => {
      let changed = false;
      const now = Date.now();
      for (const p of projects) {
        for (const t of p.terminals) {
          if (!t.isClaudeCode || !t.ccLastSpinnerTime) continue;
          const sinceSpin = now - t.ccLastSpinnerTime;
          const sinceOutput = now - (t.lastOutputTime || 0);

          // Spinner stopped for 3s → idle (waiting for input)
          if (t.claudeState === 'working' && sinceSpin > 3000) {
            t.claudeState = 'idle';
            changed = true;
          }
          // No spinner for 30s but recent output → user left CC, back to shell
          if (t.claudeState === 'idle' && sinceSpin > 30000 && sinceOutput < 5000) {
            t.isClaudeCode = false;
            t.claudeState = null;
            changed = true;
          }
          // No spinner for 3 minutes → auto-reset regardless
          if (sinceSpin > 180000) {
            t.isClaudeCode = false;
            t.claudeState = null;
            changed = true;
          }
        }
      }
      if (changed) renderSidebar();
    }, 1000);

    function showCommitInput(idx) {
      const row = document.getElementById(`commit-row-${idx}`);
      if (!row) return;
      const isVisible = row.classList.contains('visible');
      // Close all other commit rows
      document.querySelectorAll('.git-commit-row.visible').forEach(r => r.classList.remove('visible'));
      if (!isVisible) {
        row.classList.add('visible');
        const input = row.querySelector('input');
        input.value = '';
        input.focus();
      }
    }

    async function handleCommitKey(event, idx) {
      event.stopPropagation();
      if (event.key === 'Escape') {
        document.getElementById(`commit-row-${idx}`).classList.remove('visible');
        return;
      }
      if (event.key !== 'Enter') return;
      const input = event.target;
      const message = input.value.trim();
      if (!message) return;

      const header = document.getElementById(`project-header-${idx}`);
      header?.classList.add('git-busy');
      input.disabled = true;

      try {
        await invoke('git_add_and_commit', { path: projects[idx].path, message });
        document.getElementById(`commit-row-${idx}`).classList.remove('visible');
        await refreshGitStatus(idx);
        renderSidebar();
      } catch (e) {
        input.value = '';
        input.placeholder = 'Error: ' + (e || 'commit failed');
        input.disabled = false;
        setTimeout(() => { input.placeholder = 'commit message...'; }, 2000);
      }
      header?.classList.remove('git-busy');
    }

    async function pushProject(idx) {
      const header = document.getElementById(`project-header-${idx}`);
      header?.classList.add('git-busy');
      try {
        await invoke('git_push', { path: projects[idx].path });
        await refreshGitStatus(idx);
        renderSidebar();
      } catch (e) {
        console.error('Push failed:', e);
      }
      header?.classList.remove('git-busy');
    }

    // ===== Spawn terminal in project directory =====
    async function spawnProjectTerminal(projectIdx) {
      const project = projects[projectIdx];
      project.expanded = true;

      try {
        const id = await invoke('spawn_terminal', { cwd: project.path });

        const xterm = new window.Terminal({
          theme: {
            background: '#0c0c14',
            foreground: '#e0e0e8',
            cursor: '#8b5cf6',
            cursorAccent: '#0c0c14',
            selectionBackground: 'rgba(139, 92, 246, 0.3)',
            black: '#1a1a26', red: '#f87171', green: '#34d399', yellow: '#fbbf24',
            blue: '#60a5fa', magenta: '#c084fc', cyan: '#22d3ee', white: '#e0e0e8',
            brightBlack: '#55556a', brightRed: '#fca5a5', brightGreen: '#6ee7b7', brightYellow: '#fde68a',
            brightBlue: '#93c5fd', brightMagenta: '#d8b4fe', brightCyan: '#67e8f9', brightWhite: '#f0f0f5',
          },
          fontFamily: "'JetBrains Mono', 'Cascadia Code', 'Fira Code', 'SF Mono', Menlo, monospace",
          fontSize: 13,
          lineHeight: 1.3,
          cursorBlink: true,
          cursorStyle: 'bar',
          scrollback: 5000,
          allowProposedApi: true,
        });

        const fitAddon = new FitAddon.FitAddon();
        xterm.loadAddon(fitAddon);

        const paneEl = document.createElement('div');
        paneEl.className = 'terminal-pane';
        paneEl.id = 'term-' + id;
        document.getElementById('terminals-container').appendChild(paneEl);
        xterm.open(paneEl);

        xterm.onData((data) => invoke('write_terminal', { data, id }));

        project.terminals.push({
          id, xterm, fitAddon, paneEl,
          lastOutputTime: 0,
          isClaudeCode: false,
          claudeState: null,
          ccLastSpinnerTime: 0,
        });

        showTerminalPanel();
        activateTerminal(id);
        renderSidebar();

        setTimeout(() => {
          fitAddon.fit();
          const dims = fitAddon.proposeDimensions();
          if (dims) invoke('resize_terminal', { id, cols: dims.cols, rows: dims.rows });
        }, 100);

      } catch (err) {
        console.error('Failed to spawn terminal:', err);
      }
    }

    function activateTerminal(id) {
      activeTermId = id;

      // Hide all panes, show active
      document.querySelectorAll('.terminal-pane').forEach(p => p.classList.remove('active-pane'));
      const term = findTerminal(id);
      if (term) {
        term.paneEl.classList.add('active-pane');
        const project = findTerminalProject(id);
        document.getElementById('terminal-panel-name').textContent = project ? `${project.name} / bash ${id}` : `bash ${id}`;
        setTimeout(() => {
          term.fitAddon.fit();
          const d = term.fitAddon.proposeDimensions();
          if (d) invoke('resize_terminal', { id, cols: d.cols, rows: d.rows });
          term.xterm.focus();
        }, 50);
      }

      renderSidebar();
    }

    async function closeTerminal(id) {
      await invoke('close_terminal', { id });

      for (const p of projects) {
        const idx = p.terminals.findIndex(t => t.id === id);
        if (idx !== -1) {
          p.terminals[idx].xterm.dispose();
          p.terminals[idx].paneEl.remove();
          p.terminals.splice(idx, 1);
          break;
        }
      }

      // Activate next terminal or hide panel
      const allTerminals = projects.flatMap(p => p.terminals);
      if (allTerminals.length === 0) {
        activeTermId = null;
        hideTerminalPanel();
      } else if (activeTermId === id) {
        activateTerminal(allTerminals[allTerminals.length - 1].id);
      }

      renderSidebar();
    }

    // ===== Terminal panel visibility =====
    function showTerminalPanel() {
      const panel = document.getElementById('terminal-panel');
      const handle = document.getElementById('resize-handle');
      if (panel.classList.contains('visible')) return;
      panel.classList.add('visible');
      panel.style.height = terminalPanelHeight + 'px';
      handle.style.display = '';
    }

    function hideTerminalPanel() {
      document.getElementById('terminal-panel').classList.remove('visible');
      document.getElementById('resize-handle').style.display = 'none';
      document.getElementById('terminal-panel-name').textContent = '';
    }

    function fitActiveTerminal() {
      if (!activeTermId) return;
      const term = findTerminal(activeTermId);
      if (term) {
        try {
          term.fitAddon.fit();
          const d = term.fitAddon.proposeDimensions();
          if (d) invoke('resize_terminal', { id: activeTermId, cols: d.cols, rows: d.rows });
        } catch (e) {}
      }
    }

    // ===== Sidebar toggle =====
    document.getElementById('toggle-sidebar').addEventListener('click', () => {
      const sidebar = document.getElementById('sidebar');
      const resizeHandle = document.getElementById('sidebar-resize');
      const btn = document.getElementById('toggle-sidebar');
      sidebar.classList.toggle('collapsed');
      resizeHandle.style.display = sidebar.classList.contains('collapsed') ? 'none' : '';
      btn.classList.toggle('active', !sidebar.classList.contains('collapsed'));
      setTimeout(fitActiveTerminal, 250);
    });
    // Sidebar starts visible
    document.getElementById('toggle-sidebar').classList.add('active');

    // ===== Tasks toggle =====
    document.getElementById('toggle-tasks').addEventListener('click', () => {
      tasksVisible = !tasksVisible;
      const panel = document.getElementById('tasks-panel');
      const btn = document.getElementById('toggle-tasks');
      panel.classList.toggle('hidden', !tasksVisible);
      btn.classList.toggle('active', tasksVisible);
      if (tasksVisible) {
        panel.style.flex = '1';
        panel.style.height = '';
      }
      setTimeout(fitActiveTerminal, 50);
    });
    document.getElementById('toggle-tasks').classList.add('active');

    // ===== Vertical Resize (tasks <-> terminal) =====
    const resizeHandle = document.getElementById('resize-handle');
    let isVResizing = false;

    resizeHandle.addEventListener('mousedown', (e) => {
      isVResizing = true;
      resizeHandle.classList.add('active');
      document.body.style.cursor = 'row-resize';
      e.preventDefault();
    });

    document.addEventListener('mousemove', (e) => {
      if (!isVResizing) return;
      const layout = document.getElementById('content-area');
      const rect = layout.getBoundingClientRect();
      const mouseY = e.clientY - rect.top;
      const totalH = rect.height;
      let tasksH = Math.max(80, Math.min(mouseY, totalH - 156));
      let termH = totalH - tasksH - 6;

      document.getElementById('tasks-panel').style.flex = 'none';
      document.getElementById('tasks-panel').style.height = tasksH + 'px';
      document.getElementById('terminal-panel').style.height = termH + 'px';
      terminalPanelHeight = termH;
      fitActiveTerminal();
    });

    document.addEventListener('mouseup', () => {
      if (isVResizing) {
        isVResizing = false;
        resizeHandle.classList.remove('active');
        document.body.style.cursor = '';
        fitActiveTerminal();
      }
    });

    // ===== Sidebar Resize =====
    const sidebarResize = document.getElementById('sidebar-resize');
    let isSidebarResizing = false;
    let sidebarStartX = 0;
    let sidebarStartW = 0;

    sidebarResize.addEventListener('mousedown', (e) => {
      isSidebarResizing = true;
      sidebarResize.classList.add('active');
      sidebarStartX = e.clientX;
      sidebarStartW = document.getElementById('sidebar').getBoundingClientRect().width;
      document.body.style.cursor = 'col-resize';
      e.preventDefault();
    });

    document.addEventListener('mousemove', (e) => {
      if (!isSidebarResizing) return;
      const dx = e.clientX - sidebarStartX;
      const newW = Math.max(180, Math.min(400, sidebarStartW + dx));
      document.getElementById('sidebar').style.width = newW + 'px';
    });

    document.addEventListener('mouseup', () => {
      if (isSidebarResizing) {
        isSidebarResizing = false;
        sidebarResize.classList.remove('active');
        document.body.style.cursor = '';
        fitActiveTerminal();
      }
    });

    // ===== Add Project Modal =====
    let modalDirs = [];
    let modalSelected = new Set();

    document.getElementById('sidebar-add-btn').addEventListener('click', openAddModal);

    function openAddModal() {
      const modal = document.getElementById('add-project-modal');
      modal.classList.add('open');
      document.getElementById('modal-search').value = '';
      document.getElementById('modal-search').focus();
      modalSelected.clear();
      modalDirs = [];
      renderModalList();
      updateModalFooter();

      // Scan directories
      document.getElementById('modal-list').innerHTML = `<div class="modal-loading"><div class="spinner"></div>Scanning directories...</div>`;
      document.getElementById('modal-path-info').textContent = WSL_BASE + '/';

      invoke('scan_wsl_dirs', { path: WSL_BASE }).then(dirs => {
        modalDirs = dirs;
        renderModalList();
      }).catch(err => {
        document.getElementById('modal-list').innerHTML = `<div class="modal-loading" style="color: var(--danger)">Failed to scan: ${err}</div>`;
      });
    }

    function closeAddModal() {
      document.getElementById('add-project-modal').classList.remove('open');
    }

    document.getElementById('modal-close').addEventListener('click', closeAddModal);
    document.getElementById('modal-cancel').addEventListener('click', closeAddModal);
    document.getElementById('add-project-modal').addEventListener('click', (e) => {
      if (e.target === e.currentTarget) closeAddModal();
    });

    document.getElementById('modal-search').addEventListener('input', renderModalList);

    function renderModalList() {
      const filter = document.getElementById('modal-search').value.toLowerCase();
      const list = document.getElementById('modal-list');
      const existingPaths = new Set(projects.map(p => p.path));
      const checkSvg = `<svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="3" stroke-linecap="round"><polyline points="20 6 9 17 4 12"/></svg>`;

      const filtered = modalDirs.filter(d => d.name.toLowerCase().includes(filter));

      if (filtered.length === 0 && modalDirs.length > 0) {
        list.innerHTML = `<div class="modal-loading">No matches</div>`;
        return;
      }

      list.innerHTML = filtered.map(d => {
        const alreadyAdded = existingPaths.has(d.path);
        const selected = modalSelected.has(d.path);
        const cls = alreadyAdded ? 'already-added' : selected ? 'selected' : '';
        return `<div class="modal-dir-item ${cls}" data-path="${d.path}" onclick="toggleModalItem(this, '${d.path}', ${alreadyAdded})">
          <div class="modal-dir-check">${checkSvg}</div>
          <span class="modal-dir-name">${d.name}</span>
          ${alreadyAdded ? '<span class="modal-dir-badge">added</span>' : ''}
        </div>`;
      }).join('');
    }

    function toggleModalItem(el, path, alreadyAdded) {
      if (alreadyAdded) return;
      if (modalSelected.has(path)) {
        modalSelected.delete(path);
      } else {
        modalSelected.add(path);
      }
      renderModalList();
      updateModalFooter();
    }

    function updateModalFooter() {
      const count = modalSelected.size;
      document.getElementById('modal-selected-count').textContent = `${count} selected`;
      document.getElementById('modal-add').disabled = count === 0;
    }

    document.getElementById('modal-add').addEventListener('click', async () => {
      const newProjects = modalDirs.filter(d => modalSelected.has(d.path));
      for (const np of newProjects) {
        if (!projects.find(p => p.path === np.path)) {
          projects.push({ path: np.path, name: np.name, expanded: true, terminals: [] });
        }
      }
      await persistProjects();
      renderSidebar();
      closeAddModal();
    });

    // ===== Browser Panel =====
    let browserVisible = false;
    let browserHistory = [];
    let browserHistoryIdx = -1;
    let browserPanelWidth = 480;

    document.getElementById('toggle-browser').addEventListener('click', () => {
      browserVisible = !browserVisible;
      const panel = document.getElementById('browser-panel');
      const resize = document.getElementById('browser-resize');
      const btn = document.getElementById('toggle-browser');
      panel.classList.toggle('visible', browserVisible);
      resize.classList.toggle('visible', browserVisible);
      btn.classList.toggle('active', browserVisible);
      if (browserVisible) {
        panel.style.width = browserPanelWidth + 'px';
        document.getElementById('browser-url').focus();
      }
      setTimeout(fitActiveTerminal, 50);
    });

    document.getElementById('browser-url').addEventListener('keydown', (e) => {
      if (e.key !== 'Enter') return;
      let url = e.target.value.trim();
      if (!url) return;
      if (!/^https?:\/\//i.test(url)) url = 'http://' + url;
      navigateBrowser(url);
    });

    function navigateBrowser(url) {
      const frame = document.getElementById('browser-frame');
      const empty = document.getElementById('browser-empty');
      empty.classList.add('hidden');
      frame.src = url;
      document.getElementById('browser-url').value = url.replace(/^https?:\/\//, '');

      // History management
      if (browserHistoryIdx < browserHistory.length - 1) {
        browserHistory = browserHistory.slice(0, browserHistoryIdx + 1);
      }
      browserHistory.push(url);
      browserHistoryIdx = browserHistory.length - 1;
      updateBrowserNav();
    }

    function updateBrowserNav() {
      document.getElementById('browser-back').disabled = browserHistoryIdx <= 0;
      document.getElementById('browser-forward').disabled = browserHistoryIdx >= browserHistory.length - 1;
    }

    document.getElementById('browser-back').addEventListener('click', () => {
      if (browserHistoryIdx > 0) {
        browserHistoryIdx--;
        const url = browserHistory[browserHistoryIdx];
        document.getElementById('browser-frame').src = url;
        document.getElementById('browser-url').value = url.replace(/^https?:\/\//, '');
        updateBrowserNav();
      }
    });

    document.getElementById('browser-forward').addEventListener('click', () => {
      if (browserHistoryIdx < browserHistory.length - 1) {
        browserHistoryIdx++;
        const url = browserHistory[browserHistoryIdx];
        document.getElementById('browser-frame').src = url;
        document.getElementById('browser-url').value = url.replace(/^https?:\/\//, '');
        updateBrowserNav();
      }
    });

    document.getElementById('browser-refresh').addEventListener('click', () => {
      const frame = document.getElementById('browser-frame');
      if (frame.src) frame.src = frame.src;
    });

    updateBrowserNav();

    // Browser resize
    const browserResize = document.getElementById('browser-resize');
    let isBrowserResizing = false;
    let browserStartX = 0;
    let browserStartW = 0;

    browserResize.addEventListener('mousedown', (e) => {
      isBrowserResizing = true;
      browserResize.classList.add('active');
      browserStartX = e.clientX;
      browserStartW = document.getElementById('browser-panel').getBoundingClientRect().width;
      document.body.style.cursor = 'col-resize';
      e.preventDefault();
    });

    document.addEventListener('mousemove', (e) => {
      if (!isBrowserResizing) return;
      const dx = browserStartX - e.clientX;
      const newW = Math.max(280, Math.min(900, browserStartW + dx));
      document.getElementById('browser-panel').style.width = newW + 'px';
      browserPanelWidth = newW;
    });

    document.addEventListener('mouseup', () => {
      if (isBrowserResizing) {
        isBrowserResizing = false;
        browserResize.classList.remove('active');
        document.body.style.cursor = '';
        fitActiveTerminal();
      }
    });

    // ===== Keyboard shortcuts =====
    document.addEventListener('keydown', (e) => {
      if (e.ctrlKey && e.key === '`') {
        e.preventDefault();
        // If there's an active terminal, focus it. Otherwise open first project terminal.
        if (activeTermId) {
          const term = findTerminal(activeTermId);
          if (term) term.xterm.focus();
        } else if (projects.length > 0) {
          spawnProjectTerminal(0);
        }
      }
      if (e.key === 'Escape') {
        closeAddModal();
      }
      if (e.ctrlKey && e.key === 'b') {
        e.preventDefault();
        document.getElementById('toggle-sidebar').click();
      }
    });

    // ===== Window resize =====
    window.addEventListener('resize', () => fitActiveTerminal());

    // ===== Init =====
    initProjects();
  </script>
</body>
</html>
